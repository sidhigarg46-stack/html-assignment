<!DOCTYPE html>
<html>
    <head>
        <title>Zomato</title>

    </head>
    <body>
        <h1>Zomato</h1>
        <h2>Pizza Wings</h2><br>
        <h3>Menu</h3>
        <table>
            <tr>
                <th>Item</th>
                <th>Category</th>
                <th>Price</th>
            </tr>
            <tr>
                <td>Paneer onion Pizza</td>
                <td>Pizza</td>
                <td>₹199</td>
            </tr>

            <tr>
                <td>Margherita</td>
                <td>Pizza</td>
                <td>₹219</td>
            </tr>

            <tr>
                <td>Chocolava</td>
                <td>Dessert</td>
                <td>₹99</td>
            </tr>

            <tr>
                <td>Garlic Bread</td>
                <td>Sides</td>
                <td>₹149</td>
            </tr>
        </table><br>


        <h3>Customer Reviews</h3>
        <ul>
            <li>Pizza is very crispy</li>
            <li>loved it </li>
            <li>chocolava is so good</li>
        </ul>

        <h3>Order here</h3>
        <form>
            <label for = "cname">Customer name</label>
            <input type = "text" id = "cname" name="cname" ><br><br>

            <label for = "iname">Item name</label>
            <select id = "iname" name = "iname" ><option value = "paneer onion">paneer onion</option>
            <option value = "Garlic Bread">Garlic Bread</option>
            <option value = "Chocolava">Chocolava</option>
            <option value = "Margherita">margherita</option>
        </select><br><br>


            <label for = "qty">Quantity</label>
            <input type = "text" id = "qty" name="qty" ><br><br>

            <button type = "button" onclick = "alert('order placed')">Order</button>

        </form>


    </body>

</html>
