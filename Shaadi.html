<!DOCTYPE html>
<html>
    <head>
        <title>form</title>

    </head>
    <body>
        <h1>Shaadi.com profile form</h1>

        <form>
            <fieldset>
                <legend>Personal Information</legend>
                <label for = "fname">full name</label>
                <input type ="text " id = "fname" name = "fname" ><br><br>
                <label for = "ename">email</label>
                <input type ="email " id = "ename" name = "ename" ><br><br>
                <label for = "pname">phn no.</label>
                <input type ="number " id = "pname" name = "pname" ><br><br>
                <label for = "cname">city</label>
                <input type ="text " id = "cname" name = "cname" ><br><br>
                <label for = "dname">dob</label>
                <input type ="datetime " id = "dname" name = "dame" ><br><br>


            </fieldset><br>
            <fieldset>
                <legend>Gender</legend>
                
                <input type = "radio" id = "g" name = "g">
                <label for = "g">male</label><br>
                <input type = "radio" id = "a" name = "a">
                <label for = "a">female</label><br>
                <input type = "radio" id = "o" name = "o">
                <label for = "o">other</label>

        
            </fieldset><br>

            <fieldset>
                <legend>Education</legend>
                <label for = "iname">Highest qualification</label>
            <select id = "iname" name = "iname" ><option value = "Btech">Btech</option>/option>
            <option value = "BBA">BBA</option>
            <option value = "MBA">MBA</option>
            <option value = "other">other</option>
            </select><br><br>
            <label for = "op">occupation</label>
                <input type ="text " id = "op" name = "op" ><br><br>
              <label for = "aname">annual income</label>
             <input type ="number " id = "aname" name = "aname" ><br><br>
            </fieldset><br>

           
            <label for="user-notes">Any other info</label><br>
            <textarea id="user-notes" name="user-notes" ></textarea><br><br>
            <label for="notes">What you are looking for</label><br>
            <textarea id="notes" name="notes" ></textarea><br><br>



            <button type="submit"> create profile</button>
            <button type="submit"> clear</button>


 


        </form>
    </body>
</html>
